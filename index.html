<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프야퀴즈 노예 v1.3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12111e;
    --bg2: #0e0d19;
    --card: #1c1b2e;
    --card2: #222136;
    --border: #2a2840;
    --border2: #332f50;
    --neon: #4dffc3;
    --neon-dim: rgba(77,255,195,0.1);
    --neon-glow: 0 0 20px rgba(77,255,195,0.35);
    --text: #e8e6f0;
    --muted: #6b6880;
    --muted2: #9490a8;
    --wrong: #ff5c7a;
    --yellow: #ffd166;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(77,255,195,0.025) 1px,transparent 1px), linear-gradient(90deg,rgba(77,255,195,0.025) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }

  /* ── LAYOUT ── */
  .wrap { display:flex; min-height:100vh; position:relative; z-index:1; }

  /* LEFT PANEL - article list */
  .sidebar {
    width:360px;
    flex-shrink:0;
    background:var(--bg2);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    height:100vh;
    position:sticky;
    top:0;
  }

  .sidebar-header {
    padding:24px 20px 16px;
    border-bottom:1px solid var(--border);
  }

  .app-title {
    font-size:11px;
    font-weight:500;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--neon);
    opacity:0.7;
    margin-bottom:4px;
  }

  .app-name { font-size:16px; font-weight:700; color:var(--text); }
  .apikey-wrap {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .apikey-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }

  .apikey-row {
    display: flex;
    gap: 6px;
  }

  .apikey-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }

  .apikey-row input:focus { border-color: rgba(77,255,195,0.4); }
  .apikey-row input::placeholder { color: var(--muted); opacity: 0.5; }

  .apikey-toggle {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 14px;
    transition: border-color 0.15s;
    flex-shrink: 0;
  }

  .apikey-toggle:hover { border-color: var(--muted); }

  .apikey-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.4;
  }

  .app-credit { font-size:11px; color:var(--muted); margin-top:2px; }

  .article-list { flex:1; overflow-y:auto; padding:12px; }

  .article-item {
    padding:12px 14px;
    border-radius:10px;
    border:1px solid transparent;
    cursor:pointer;
    margin-bottom:6px;
    transition:all 0.15s;
    position:relative;
  }

  .article-item:hover { background:var(--card); border-color:var(--border); }
  .article-item.active { background:var(--neon-dim); border-color:rgba(77,255,195,0.3); }

  .article-item-num {
    font-size:10px;
    font-weight:700;
    letter-spacing:0.1em;
    color:var(--muted);
    margin-bottom:4px;
  }

  .article-item.active .article-item-num { color:var(--neon); }

  .article-item-title {
    font-size:13px;
    font-weight:500;
    color:var(--text);
    line-height:1.4;
    overflow:hidden;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
  }

  .article-item-badge {
    display:inline-block;
    margin-top:6px;
    font-size:10px;
    padding:2px 8px;
    border-radius:20px;
    font-weight:600;
  }

  .badge-ready { background:rgba(77,255,195,0.15); color:var(--neon); }
  .badge-pending { background:rgba(107,104,128,0.2); color:var(--muted2); }
  .badge-loading { background:rgba(255,209,102,0.15); color:var(--yellow); }

  .add-btn {
    margin:12px;
    width:calc(100% - 24px);
    padding:11px;
    background:var(--neon-dim);
    border:1px dashed rgba(77,255,195,0.3);
    border-radius:10px;
    color:var(--neon);
    font-family:'Noto Sans KR',sans-serif;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    transition:all 0.2s;
    letter-spacing:0.02em;
  }

  .add-btn:hover { background:rgba(77,255,195,0.18); border-color:var(--neon); }

  /* RIGHT MAIN */
  .main { flex:1; overflow-y:auto; padding:40px 48px; }

  /* empty state */
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:70vh; text-align:center; opacity:0.5; }
  .empty-icon { font-size:48px; margin-bottom:16px; }
  .empty-title { font-size:16px; font-weight:600; margin-bottom:8px; }
  .empty-desc { font-size:13px; color:var(--muted); line-height:1.6; }

  /* INPUT CARD */
  .input-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:28px;
    margin-bottom:24px;
  }

  .section-label {
    font-size:11px;
    font-weight:700;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--neon);
    opacity:0.8;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .section-label span { opacity:0.4; font-weight:400; text-transform:none; letter-spacing:0; font-size:12px; }

  input[type="text"] {
    width:100%;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:11px 14px;
    color:var(--text);
    font-family:'Noto Sans KR',sans-serif;
    font-size:13px;
    outline:none;
    margin-bottom:12px;
    transition:border-color 0.2s;
  }

  input[type="text"]:focus { border-color:rgba(77,255,195,0.5); }
  input[type="text"]::placeholder { color:var(--muted); }

  textarea {
    width:100%;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:14px;
    color:var(--text);
    font-family:'Noto Sans KR',sans-serif;
    font-size:13px;
    line-height:1.7;
    resize:vertical;
    min-height:180px;
    outline:none;
    transition:border-color 0.2s;
  }

  textarea:focus { border-color:rgba(77,255,195,0.5); }
  textarea::placeholder { color:var(--muted); }

  .btn-row { display:flex; gap:10px; margin-top:16px; }

  .btn-primary {
    background:var(--neon);
    color:#0d0c1a;
    border:none;
    border-radius:8px;
    padding:11px 24px;
    font-family:'Noto Sans KR',sans-serif;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:all 0.2s;
  }

  .btn-primary:hover { box-shadow:var(--neon-glow); transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .btn-ghost {
    background:transparent;
    color:var(--muted2);
    border:1px solid var(--border2);
    border-radius:8px;
    padding:11px 20px;
    font-family:'Noto Sans KR',sans-serif;
    font-size:14px;
    cursor:pointer;
    transition:all 0.2s;
  }

  .btn-ghost:hover { color:var(--text); border-color:var(--muted); }

  /* LOADING */
  .loading-bar {
    display:none;
    align-items:center;
    gap:12px;
    padding:16px 20px;
    background:rgba(77,255,195,0.06);
    border:1px solid rgba(77,255,195,0.2);
    border-radius:10px;
    margin-bottom:20px;
    font-size:13px;
    color:var(--neon);
  }

  .loading-bar.active { display:flex; }

  .spin { width:16px; height:16px; border:2px solid rgba(77,255,195,0.2); border-top-color:var(--neon); border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* RESULT CARD */
  .result-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    margin-bottom:16px;
  }

  .result-header {
    padding:20px 20px 16px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:flex-start;
    gap:12px;
  }

  .result-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:4px; }

  .result-source {
    font-size:11px;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    word-break:break-all;
  }

  .copy-all-btn {
    flex-shrink:0;
    background:var(--neon-dim);
    border:1px solid rgba(77,255,195,0.3);
    border-radius:8px;
    padding:7px 14px;
    color:var(--neon);
    font-family:'Noto Sans KR',sans-serif;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.15s;
    white-space:nowrap;
  }

  .copy-all-btn:hover { background:rgba(77,255,195,0.18); }
  .copy-all-btn.copied { background:rgba(77,255,195,0.25); color:#0d0c1a; }

  /* QUIZ ITEMS */
  .quiz-list { padding:16px 20px; display:flex; flex-direction:column; gap:12px; }

  .quiz-item {
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }

  .q-num {
    font-size:10px;
    font-weight:700;
    letter-spacing:0.15em;
    color:var(--neon);
    opacity:0.6;
    flex-shrink:0;
    padding-top:2px;
  }

  .q-text { font-size:14px; font-weight:600; line-height:1.5; flex:1; }

  .toggle-icon { color:var(--muted); font-size:12px; flex-shrink:0; transition:transform 0.2s; }

  .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:14px 0; }

  .opt {
    padding:9px 12px;
    border-radius:8px;
    border:1px solid var(--border2);
    font-size:13px;
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--card);
  }

  .opt.correct { border-color:rgba(77,255,195,0.4); background:rgba(77,255,195,0.07); }
  .opt-key { font-size:11px; font-weight:700; color:var(--muted); min-width:16px; }
  .opt.correct .opt-key { color:var(--neon); }

  .exp-box {
    padding:10px 14px;
    background:rgba(77,255,195,0.05);
    border-left:3px solid var(--neon);
    border-radius:0 6px 6px 0;
    font-size:12px;
    color:var(--muted2);
    line-height:1.7;
    margin-bottom:12px;
  }

  /* CODE BLOCK */
  .code-block {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:14px 16px;
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    line-height:1.6;
    color:#c8c5e0;
    white-space:pre-wrap;
    word-break:break-all;
    position:relative;
    margin-top:10px;
  }

  .copy-snippet-btn {
    position:absolute;
    top:10px;
    right:10px;
    background:var(--card2);
    border:1px solid var(--border2);
    border-radius:6px;
    padding:4px 10px;
    font-size:11px;
    color:var(--muted2);
    cursor:pointer;
    transition:all 0.15s;
    font-family:'Noto Sans KR',sans-serif;
  }

  .copy-snippet-btn:hover { color:var(--neon); border-color:rgba(77,255,195,0.3); }
  .copy-snippet-btn.copied { color:var(--neon); }

  /* ERROR */
  .err-box { display:none; padding:14px 18px; background:rgba(255,92,122,0.08); border:1px solid rgba(255,92,122,0.3); border-radius:10px; font-size:13px; color:var(--wrong); line-height:1.6; margin-bottom:16px; }
  .err-box.active { display:block; }

  .quiz-body { }

  .admin-toggle {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 16px;
    border-top:1px solid var(--border);
    cursor:pointer;
    color:var(--muted);
    font-size:12px;
    transition:background 0.15s;
    user-select:none;
  }

  .admin-toggle:hover { background:rgba(255,255,255,0.02); color:var(--muted2); }

  .admin-detail {
    display:none;
    padding:0 16px 16px;
  }

  /* ── CHECKBOX ── */
  .quiz-checkbox {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    border: 2px solid var(--border2);
    background: var(--bg);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-top: 2px;
  }

  .quiz-checkbox.checked {
    background: var(--neon);
    border-color: var(--neon);
    box-shadow: 0 0 8px rgba(77,255,195,0.4);
  }

  .quiz-item-checked {
    border-color: rgba(77,255,195,0.35) !important;
    background: rgba(77,255,195,0.03) !important;
  }

  .quiz-item:hover { background: rgba(255,255,255,0.01); }

  /* ── SEL CARD TOP ── */
  .sel-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  /* ── SEL OPTS 2x2 GRID ── */
  .sel-opts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin: 10px 0;
  }

  /* ── BADGE SELECTED ── */
  .badge-selected { background: rgba(77,255,195,0.15); color: var(--neon); }
  .badge-unselected { background: rgba(107,104,128,0.15); color: var(--muted2); }

  /* ── SELECT PICK BUTTON ── */
  .sel-pick-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted2);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .sel-pick-btn:hover { border-color: var(--neon); color: var(--neon); background: var(--neon-dim); }
  .sel-pick-btn.selected { background: var(--neon-dim); border-color: var(--neon); color: var(--neon); }

  /* ── URL FETCH ── */
  .url-fetch-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .url-fetch-row input {
    flex: 1;
    margin-bottom: 0 !important;
  }

  .btn-fetch {
    flex-shrink: 0;
    background: var(--neon-dim);
    border: 1px solid rgba(77,255,195,0.35);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--neon);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-fetch:hover { background: rgba(77,255,195,0.2); border-color: var(--neon); }
  .btn-fetch:disabled { opacity: 0.4; cursor: not-allowed; }

  .fetch-status {
    font-size: 12px;
    margin-bottom: 10px;
    min-height: 16px;
    line-height: 1.5;
  }

  .fetch-status-loading { color: var(--yellow); }
  .fetch-status-ok { color: var(--neon); }
  .fetch-status-error { color: var(--wrong); }

  /* ── BULK IMPORT ── */
  .bulk-section {
    padding: 14px 12px 10px;
    border-bottom: 1px solid var(--border);
  }

  .bulk-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .bulk-date-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bulk-date-row input[type="date"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 7px 6px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    outline: none;
    min-width: 0;
    color-scheme: dark;
  }

  .bulk-date-row input[type="date"]:focus { border-color: rgba(77,255,195,0.4); }

  .bulk-date-sep { font-size: 12px; color: var(--muted); flex-shrink: 0; }

  /* PREVIEW PANEL */
  .bulk-preview {
    border-top: 1px solid var(--border);
    flex-direction: column;
  }

  .bulk-preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    gap: 8px;
  }

  .bulk-preview-header span {
    font-size: 11px;
    color: var(--muted2);
    font-weight: 600;
  }

  .btn-bulk-gen {
    background: var(--neon);
    border: none;
    border-radius: 7px;
    padding: 6px 10px;
    color: #0d0c1a;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-bulk-gen:hover { box-shadow: var(--neon-glow); }
  .btn-bulk-gen:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

  .btn-bulk-filter {
    background: transparent;
    border: 1px solid rgba(77,255,195,0.35);
    border-radius: 7px;
    padding: 6px 10px;
    color: var(--neon);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-bulk-filter:hover { background: var(--neon-dim); }
  .btn-bulk-filter:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-bulk-stop {
    background: rgba(255,92,122,0.12);
    border: 1px solid rgba(255,92,122,0.3);
    border-radius: 7px;
    padding: 6px 10px;
    color: var(--wrong);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-bulk-stop:hover { background: rgba(255,92,122,0.22); }

  .bulk-preview-list {
    max-height: 260px;
    overflow-y: auto;
    padding: 0 8px 8px;
  }

  .bulk-preview-item {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 7px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 4px;
    background: var(--bg);
    font-size: 11px;
    color: var(--text);
    line-height: 1.5;
  }

  .bulk-preview-item.removed {
    opacity: 0.3;
    text-decoration: line-through;
  }

  .bulk-preview-title { flex: 1; min-width: 0; font-size: 11px; line-height: 1.5; word-break: keep-all; }

  .bulk-remove-btn {
    flex-shrink: 0;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
  }

  .bulk-remove-btn:hover { color: var(--wrong); }

  .btn-bulk {
    flex-shrink: 0;
    background: var(--neon-dim);
    border: 1px solid rgba(77,255,195,0.3);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--neon);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-bulk:hover { background: rgba(77,255,195,0.18); border-color: var(--neon); }
  .btn-bulk:disabled { opacity: 0.4; cursor: not-allowed; }

  .bulk-status {
    font-size: 11px;
    margin-top: 7px;
    min-height: 14px;
    line-height: 1.5;
    color: var(--muted);
  }

  .bulk-status.ok { color: var(--neon); }
  .bulk-status.err { color: var(--wrong); }
  .bulk-status.loading { color: var(--yellow); }

  @keyframes bulkSlide {
    0%   { left: -35%; }
    100% { left: 100%; }
  }

  /* ── FLOATING SELECTED BTN ── */
  .floating-selected-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 8px;

<body>
<div class="wrap">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-title">Quiz Generator v1.3</div>
      <div class="app-name">프야퀴즈 노예</div>
      <div class="app-credit">made by hansuru</div>

    </div>

    <div class="article-list" id="articleList">
      <!-- items injected by JS -->
    </div>
    <div class="sidebar-bottom">
      <button class="add-btn" onclick="addNewArticle()">＋ 기사 직접 추가</button>
      <button class="apikey-setting-btn" id="apikeySettingBtn" onclick="showApiKeyModal()">🔑 API 키 입력 (필수)</button>

    </div>
  </aside>

  <!-- SELECTED PANEL -->
  <div class="selected-panel-overlay" id="selectedPanelOverlay" onclick="hideSelectedPanel()"></div>
  <div class="selected-panel" id="selectedPanel">
    <div class="selected-panel-header">
      <div>
        <div style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--neon);opacity:0.7;margin-bottom:4px;">프야퀴즈 후보</div>
        <div style="font-size:16px;font-weight:700;">프야퀴즈 후보</div>
      </div>
      <button class="panel-close-btn" onclick="hideSelectedPanel()">✕ 닫기</button>
    </div>
    <div class="selected-panel-body" id="selectedPanelBody">
      <div class="selected-empty">아직 선택된 문제가 없어요.<br>각 기사에서 문제를 선택해주세요.</div>
    </div>
  </div>

  <!-- MAIN -->
  <main class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📰</div>
      <div class="empty-title">기사를 추가해주세요</div>
      <div class="empty-desc">와이즈토토 기사링크를 추가하면 자동으로 퀴즈가 생성됩니다.</div>
    </div>
  </main>

</div>

<!-- API 키 모달 -->
<div class="apikey-modal-overlay" id="apikeyOverlay" onclick="closeApiKeyModal()"></div>
<div class="apikey-modal" id="apikeyModal">
  <div class="apikey-modal-title">🔑 Gemini API 키 입력</div>
  <div class="apikey-modal-desc">
    <a href="https://aistudio.google.com" target="_blank" style="color:var(--neon)">aistudio.google.com</a>에서 발급받은 키를 입력하세요.<br>
    키는 이 브라우저에만 저장되며 외부로 전송되지 않아요.
  </div>
  <div class="apikey-modal-row">
    <input type="password" id="apikeyInput" placeholder="AIzaSy..." onkeydown="if(event.key==='Enter')saveApiKeyModal()" />
    <button class="apikey-modal-toggle" onclick="toggleApiKeyVis()">👁</button>
  </div>
  <div style="display:flex;gap:8px;margin-top:12px;">
    <button class="apikey-modal-save" onclick="saveApiKeyModal()">저장</button>
    <button class="apikey-modal-cancel" onclick="closeApiKeyModal()">취소</button>
  </div>
</div>

<!-- 플로팅 선택 문제 버튼 -->
<button class="floating-selected-btn" id="selectedNav" onclick="showSelectedPanel()">
  <span class="floating-selected-icon">✦</span>
  <span class="floating-selected-text">선택된 문제</span>
  <span class="floating-selected-badge" id="selectedCount">0</span>
</button>

<script>
const LABELS = ['A','B','C','D'];
let articles = []; // {id, title, source, content, status:'pending'|'loading'|'ready', quizzes:[]}
let activeId = null;

/* ── SIDEBAR ── */
function renderSidebar() {
  const list = document.getElementById('articleList');
  if (articles.length === 0) {
    list.innerHTML = '<div style="padding:20px 14px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6;">아직 기사가 없어요.<br>아래 버튼으로 추가해보세요!</div>';
    return;
  }
  list.innerHTML = articles.map((a,i) => `
    <div class="article-item ${a.id===activeId?'active':''}" onclick="selectArticle('${a.id}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px;">
        <div style="min-width:0;flex:1;">
          <div class="article-item-num">기사 ${i+1}</div>
          <div class="article-item-title">${a.title || '제목 없음'}</div>
          <span class="article-item-badge badge-${a.status}">
            ${a.status==='ready'
              ? (selectedQuizzes.some(function(s){return s.aid===a.id;}) ? '✦ 선택완료' : '<span style="color:var(--muted);font-weight:400;">선택 안함</span>')
              : a.status==='loading' ? '생성 중...' : '대기 중'}
          </span>
        </div>
        <button class="article-delete-btn" onclick="event.stopPropagation();deleteArticle('${a.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

/* ── ADD ARTICLE ── */
function addNewArticle() {
  const id = 'a' + Date.now();
  articles.push({ id, title:'', source:'', content:'', status:'pending', quizzes:[] });
  selectArticle(id);
  renderSidebar();
}

/* ── SELECT ── */
function selectArticle(id) {
  activeId = id;
  renderSidebar();
  renderMain();

  // 내용이 없는 기사면 자동으로 불러오기 + 퀴즈 생성
  const a = articles.find(function(x){ return x.id === id; });
  if (a && !a.content && a.source && a.status === 'pending') {
    const srcEl = document.getElementById('src-' + id);
    if (srcEl) srcEl.value = a.source;
    fetchArticle(id);
  }
}

/* ── MAIN RENDER ── */
function renderMain() {
  const main = document.getElementById('mainArea');
  const a = articles.find(x => x.id === activeId);

  if (!a) {
    main.innerHTML = `<div class="empty-state" id="emptyState">
      <div class="empty-icon">📰</div>
      <div class="empty-title">기사를 추가해주세요</div>
      <div class="empty-desc">와이즈토토 기사링크를 추가하면 자동으로 퀴즈가 생성됩니다.</div>
    </div>`;
    return;
  }

  main.innerHTML = `
    <!-- INPUT -->
    <div class="input-card" id="inputCard-${a.id}">
      <div class="section-label">기사 정보 입력</div>
      <div class="url-fetch-row">
        <input type="text" id="src-${a.id}" placeholder="뉴스 URL 입력 후 문제 생성..." value="${esc(a.source)}" oninput="updateField('${a.id}','source',this.value)" onkeydown="if(event.key==='Enter')fetchArticle('${a.id}')" style="font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:0;" />
        <button class="btn-fetch" id="fetchbtn-${a.id}" onclick="fetchArticle('${a.id}')">문제 생성</button>
      </div>
      <input type="text" id="ttl-${a.id}" placeholder="기사 제목" value="${esc(a.title)}" oninput="updateField('${a.id}','title',this.value)" />
      <textarea id="cnt-${a.id}" placeholder="URL로 불러오거나 본문을 직접 붙여넣으세요..." oninput="updateField('${a.id}','content',this.value)">${esc(a.content)}</textarea>
      <div class="fetch-status" id="fetchstatus-${a.id}" style="margin-top:8px;"></div>
      <div class="err-box" id="err-${a.id}"></div>
      <div class="loading-bar" id="load-${a.id}"><div class="spin"></div><span id="loadtxt-${a.id}">퀴즈를 생성하고 있습니다...</span></div>

    </div>

    <!-- RESULT -->
    <div id="result-${a.id}">
      ${a.status === 'ready' ? renderResult(a) : ''}
    </div>

  `;
}

function renderResult(a) {
  if (!a.quizzes || a.quizzes.length === 0) return '';
  return `
    <div class="result-card">
      <div class="result-header">
        <div style="flex:1;min-width:0;">
          <div class="result-title">${esc(a.title) || '제목 없음'}</div>
          <div class="result-source">${esc(a.source) || ''}</div>
        </div>
        <button class="regen-btn" id="regenbtn-${a.id}" onclick="regenQuiz('${a.id}')">↺ 재생성</button>
      </div>
      <div class="quiz-list">
        ${a.quizzes.map((q,qi) => renderQuizItem(a, q, qi)).join('')}
      </div>
    </div>
  `;
}

function renderQuizItem(a, q, qi) {
  const optHtml = q.options.map((o,oi) => `
    <div class="opt ${oi===q.answer?'correct':''}">
      <span class="opt-key">${LABELS[oi]}</span>
      <span style="font-size:12px">${esc(o)}</span>
    </div>`).join('');

  const codeStr = formatQuizCode(a, q, qi);

  const isSelected = selectedQuizzes.some(s => s.aid === a.id && s.qi === qi);
  return `
    <div class="quiz-item ${isSelected?'quiz-item-checked':''}" id="qi-${a.id}-${qi}">
      <div class="quiz-body">
        <div style="display:flex;align-items:flex-start;gap:10px;padding:14px 16px 0;">
          <span class="q-num">Q${qi+1}</span>
          <span class="q-text">${esc(q.question)}</span>
        </div>
        <div style="padding:10px 16px 14px;">
          <div class="options-grid">${optHtml}</div>
          <div class="exp-box">💡 ${esc(q.explanation)}</div>
          <button class="sel-pick-btn ${isSelected?'selected':''}" id="selbtn-${a.id}-${qi}" onclick="toggleSelect('${a.id}',${qi})">
            ${isSelected ? '✦ 선택됨' : '이 문제 선택'}
          </button>
        </div>
      </div>
    </div>`;
}

function formatQuizCode(a, q, qi) {
  return `[문제 ${qi+1}]
출처: ${a.source || ''}
제목: ${a.title || ''}

Q. ${q.question}

A. ${q.options[0]}
B. ${q.options[1]}
C. ${q.options[2]}
D. ${q.options[3]}

정답: ${LABELS[q.answer]}
해설: ${q.explanation}`;
}

function formatAllCode(a) {
  return a.quizzes.map((q,qi) => formatQuizCode(a,q,qi)).join('\n\n' + '─'.repeat(40) + '\n\n');
}

/* ── SELECTION ── */
let selectedQuizzes = []; // {aid, qi}

function toggleSelect(aid, qi) {
  const idx = selectedQuizzes.findIndex(s => s.aid === aid && s.qi === qi);
  if (idx >= 0) {
    selectedQuizzes.splice(idx, 1);
  } else {
    const existingForArticle = selectedQuizzes.findIndex(s => s.aid === aid);
    if (existingForArticle >= 0) {
      if (!confirm('이 기사에서 이미 선택된 문제가 있어요.\n새 문제로 교체할까요?')) return;
      const oldQi = selectedQuizzes[existingForArticle].qi;
      selectedQuizzes.splice(existingForArticle, 1);
      // uncheck old
      const oldBox = document.getElementById(`selbtn-${aid}-${oldQi}`);
      const oldItem = document.getElementById(`qi-${aid}-${oldQi}`);
      if (oldBox) { oldBox.classList.remove('checked'); oldBox.innerHTML = ''; }
      if (oldItem) oldItem.classList.remove('quiz-item-checked');
    }
    selectedQuizzes.push({ aid, qi });
  }

  const isNowSelected = selectedQuizzes.some(s => s.aid === aid && s.qi === qi);
  const box = document.getElementById(`selbtn-${aid}-${qi}`);
  const item = document.getElementById(`qi-${aid}-${qi}`);
  if (box) {
    box.classList.toggle('selected', isNowSelected);
    box.textContent = isNowSelected ? '✦ 선택됨' : '이 문제 선택';
  }
  if (item) item.classList.toggle('quiz-item-checked', isNowSelected);

  updateSelectedBadge();
  renderSidebar();
  if (document.getElementById('selectedPanel').classList.contains('open')) renderSelectedPanel();
}

function updateSelectedBadge() {
  const badge = document.getElementById('selectedCount');
  const nav = document.getElementById('selectedNav');
  if (badge) badge.textContent = selectedQuizzes.length;
  if (nav) nav.classList.toggle('has-items', selectedQuizzes.length > 0);
}

}

function copySelectedAll() {

/* ── PROXY FETCH ── */
async function proxyFetch(url, wantHtml) {
  const proxies = [
    { url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(url), extract: function(d){ return d.contents || ''; } },
    { url: 'https://corsproxy.io/?' + encodeURIComponent(url), extract: function(d){ return d; } },
    { url: 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url), extract: function(d){ return d; } }
  ];

  for (let i = 0; i < proxies.length; i++) {
    try {
      const res = await fetch(proxies[i].url);
      if (!res.ok) continue;
      let raw;
      if (i === 0) {
        const json = await res.json();
        raw = proxies[i].extract(json);
      } else {
        raw = await res.text();
      }
      if (raw && raw.length > 200) return raw;
    } catch(e) { continue; }
  }
  throw new Error('Failed to fetch');
}

/* ── FETCH ARTICLE ── */
async function fetchArticle(id) {
  const a = articles.find(function(x){ return x.id === id; });
  if (!a) return;
  const url = document.getElementById('src-' + id).value.trim();
  if (!url || !url.startsWith('http')) {
    setFetchStatus(id, 'error', 'URL을 입력해주세요.');
    return;
  }

  setFetchStatus(id, 'loading', '기사를 불러오는 중...');
  const fetchBtn = document.getElementById('fetchbtn-' + id);
  if (fetchBtn) fetchBtn.disabled = true;

  try {
    // 1. jina.ai로 HTML 소스 긁기
    const jinaUrl = 'https://r.jina.ai/' + url;
    const res = await fetch(jinaUrl, {
      headers: { 'Accept': 'text/plain', 'X-Return-Format': 'html' }
    });

    if (!res.ok) throw new Error('fetch 실패');
    const html = await res.text();

    // 2. DOMParser로 파싱
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // 3. 제목 추출: a.news_title
    let title = '';
    const titleEl = doc.querySelector('a.news_title');
    if (titleEl) {
      title = titleEl.textContent.trim();
      // [뉴스] 같은 prefix 제거
      title = title.replace(/^\[.+?\]\s*/, '').trim();
    }

    // 4. 본문 추출: .bbs_view
    let content = '';
    const bodyEl = doc.querySelector('.bbs_view');
    if (bodyEl) {
      // 이미지 태그 제거
      bodyEl.querySelectorAll('img, script, style').forEach(function(el){ el.remove(); });
      content = bodyEl.innerText || bodyEl.textContent || '';
      content = content.replace(/\s+/g, ' ').trim();
    }

    // 5. 셀렉터 실패 시 마크다운 텍스트에서 fallback 추출
    if (!title || !content) {
      const textRes = await fetch('https://r.jina.ai/' + url, { headers: { 'Accept': 'text/plain' } });
      const text = await textRes.text();

      if (!title) {
        // 마크다운에서 제목 줄 찾기 ([뉴스] 로 시작하는 줄)
        const lines = text.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
        const titleLine = lines.find(function(l){ return l.match(/^\[.+?\]/); });
        if (titleLine) title = titleLine.replace(/^\[.+?\]\s*/, '').replace(/\[.*?\]\(.*?\)/g, '').trim();
        if (!title) {
          const shortLine = lines.find(function(l){ return l.length > 10 && l.length < 100 && !l.startsWith('http') && !l.startsWith('*') && !l.startsWith('#'); });
          if (shortLine) title = shortLine;
        }
      }

      if (!content) {
        // 날짜 패턴 이후부터 저작권 이전까지 추출
        const dateMatch = text.match(/\d{2}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/);
        const copyrightIdx = text.lastIndexOf('저작권');
        let bodyStart = dateMatch ? text.indexOf(dateMatch[0]) + dateMatch[0].length : 0;
        let bodyEnd = copyrightIdx > bodyStart ? copyrightIdx : text.length;
        content = text.slice(bodyStart, bodyEnd).replace(/!\[.*?\]\(.*?\)/g, '').replace(/\[.*?\]\(.*?\)/g, '').replace(/\s+/g, ' ').trim();
      }
    }

    if (fetchBtn) fetchBtn.disabled = false;

    if (!title && !content) {
      setFetchStatus(id, 'error', '기사를 불러오지 못했어요. 본문을 직접 붙여넣어 주세요.');
      return;
    }

    a.source = url;
    a.title = title || '';
    a.content = content.trim();

    const ttlEl = document.getElementById('ttl-' + id);
    const cntEl = document.getElementById('cnt-' + id);
    if (ttlEl) ttlEl.value = a.title;
    if (cntEl) cntEl.value = a.content;

    setFetchStatus(id, 'ok', '✓ 불러오기 완료! 퀴즈 생성 중...');
    renderSidebar();

    // 자동 퀴즈 생성
    try {
      a.status = 'loading';
      renderSidebar();
      const quiz = await callAPI(a);
      a.quizzes = quiz.quizzes;
      a.status = 'ready';
      if (!a.title && quiz.title) {
        a.title = quiz.title;
        const ttlEl2 = document.getElementById('ttl-' + id);
        if (ttlEl2) ttlEl2.value = a.title;
      }
      setFetchStatus(id, 'ok', '✓ 퀴즈 생성 완료!');
      renderSidebar();
      renderMain();
    } catch(e2) {
      a.status = 'pending';
      setFetchStatus(id, 'error', '퀴즈 생성 실패: ' + e2.message);
      renderSidebar();
    }

  } catch(e) {
    if (fetchBtn) fetchBtn.disabled = false;
    setFetchStatus(id, 'error', '불러오기 실패: ' + e.message + ' — 본문을 직접 붙여넣어 주세요.');
  }
}

function setFetchStatus(id, type, msg) {
  const el = document.getElementById('fetchstatus-' + id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'fetch-status fetch-status-' + type;
}

  selectedQuizzes = selectedQuizzes.filter(function(s){ return s.aid !== id; });

async function generateQuiz(id) {

  if (!a.content.trim() || a.content.trim().length < 50) {
    showErr(id, '기사 본문을 충분히 입력해주세요 (50자 이상).');

  try {

    setBusy(id, false);
    showErr(id, '❌ ' + e.message);
    renderSidebar();
  }
}

async function callAPI(a) {
  const GEMINI_KEY = getApiKey();
  if (!GEMINI_KEY) { showApiKeyModal(); throw new Error('API 키를 입력해주세요.'); }

  const prompt = '다음 KBO 뉴스 기사를 바탕으로 4지선다 퀴즈 5개를 만들어줘.\n\n[문제 유형 - 아래 3가지를 골고루 섞어서]\n① 인물/팀 파악: 기사의 주인공이 누구인지, 어떤 팀 소속인지, 어떤 배경을 가진 선수인지 묻는 문제\n   예) 이번 시범경기에서 무실점 호투를 펼친 한화의 새 왼손 선발은? → 왕옌청/엄상백/문동주/김민우\n   예) 왕옌청이 KBO 입단 전 마지막으로 뛰었던 팀은? → 라쿠텐/소프트뱅크/주니치/오릭스\n② 사건/상황 파악: 기사에서 일어난 일의 핵심을 묻는 문제\n   예) NC 불펜에서 이번 시즌 새롭게 필승조로 자리잡은 선수는? → 김진호/전사민/손아섭/류진욱\n③ 맥락/이유 파악: 왜 이런 일이 일어났는지, 어떤 의미인지 묻는 문제\n   예) 한화가 왕옌청을 영입한 가장 큰 이유는? → 좌완 선발 부족/불펜 보강/외국인 규정/부상 공백\n\n[절대 금지]\n- 이닝수, ERA, 피안타, 삼진 등 세부 기록 수치 찾기\n- 경기 날짜, 구장명 찾기\n- ~가 언급한 기간/수치는? 같은 단순 텍스트 찾기\n- 질문에 위 기사에서, 기사에 따르면 등 금지\n\n[규칙]\n1. 순수 JSON만 출력. answer는 정답 인덱스(0~3).\n2. 보기는 짧게 — 선수명, 팀명, 한 단어 위주. 긴 문장 금지.\n3. 오답은 야구 팬이 헷갈릴 만큼 그럴듯하게.\n4. 해설은 왜 정답인지 + 오답이 왜 틀렸는지 한 줄로.\n5. 기사 제목 없으면 본문에서 유추해서 title에 넣어줘.\n\n[기사]\n' + a.content.slice(0, 3000) + '\n\n[출력 형식]\n{\"title\":\"기사 제목\",\"quizzes\":[{\"question\":\"질문\",\"options\":[\"보기0\",\"보기1\",\"보기2\",\"보기3\"],\"answer\":0,\"explanation\":\"해설\"},{\"question\":\"질문\",\"options\":[\"보기0\",\"보기1\",\"보기2\",\"보기3\"],\"answer\":1,\"explanation\":\"해설\"},{\"question\":\"질문\",\"options\":[\"보기0\",\"보기1\",\"보기2\",\"보기3\"],\"answer\":2,\"explanation\":\"해설\"},{\"question\":\"질문\",\"options\":[\"보기0\",\"보기1\",\"보기2\",\"보기3\"],\"answer\":3,\"explanation\":\"해설\"},{\"question\":\"질문\",\"options\":[\"보기0\",\"보기1\",\"보기2\",\"보기3\"],\"answer\":0,\"explanation\":\"해설\"}]}';

  const res = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=' + GEMINI_KEY,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    }
  );

  if (!res.ok) {
    const err = await res.json().catch(function(){ return {}; });
    throw new Error(err.error ? err.error.message : '서버 오류 (' + res.status + ')');
  }
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);

  const raw = (d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts && d.candidates[0].content.parts[0]) ? d.candidates[0].content.parts[0].text : '';
  if (!raw) throw new Error('응답이 비어있습니다.');

  const m = raw.replace(/^```json\s*/i, '').replace(/```\s*$/i, '').match(/\{[\s\S]*\}/);
  if (!m) throw new Error('응답에서 데이터를 찾지 못했습니다. 다시 시도해주세요.');
  try { return JSON.parse(m[0]); }
  catch(e) { throw new Error('파싱 실패. 다시 시도해주세요.'); }
}

/* ── COPY ── */
function copyAll(id, btn) {

  navigator.clipboard.writeText(formatAllCode(a)).then(() => {
    btn.textContent = '✓ 복사됨';

    setTimeout(() => { btn.textContent = '전체 복사'; btn.classList.remove('copied'); }, 2000);

}

function copySnippet(aid, qi, btn) {
  const a = articles.find(x => x.id === aid);
  if (!a) return;
  navigator.clipboard.writeText(formatQuizCode(a, a.quizzes[qi], qi)).then(() => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);

function exportAll() {
  const ready = articles.filter(x => x.status === 'ready');
  if (ready.length === 0) return;
  const all = ready.map((a,i) =>
    `${'═'.repeat(50)}\n기사 ${i+1}. ${a.source ? `[${a.source}] ` : ''}${a.title || '제목 없음'}\n${'═'.repeat(50)}\n\n` + formatAllCode(a)
  ).join('\n\n\n');
  navigator.clipboard.writeText(all).then(() => {
    const btn = event.target;
    btn.textContent = '✓ 복사 완료!';
    setTimeout(() => btn.textContent = '전체 복사', 2000);
  });
}

  // 해당 기사의 선택된 문제도 제거
  selectedQuizzes = selectedQuizzes.filter(function(s){ return s.aid !== id; });
  activeId = articles.length > 0 ? articles[articles.length-1].id : null;
  updateSelectedBadge();
  if (document.getElementById('selectedPanel').classList.contains('open')) renderSelectedPanel();
  renderSidebar();
  renderMain();
}

/* ── BULK FETCH ── */
/* bulk article candidates: [{seq, title, url, removed}] */
let bulkCandidates = [];
let bulkStopped = false;
let scanStopped = false;

function handleBulkBtn() {
  const btn = document.getElementById('bulkBtn');
  if (btn && btn.dataset.scanning === '1') {
    // 스캔 중 → 중단
    scanStopped = true;
    btn.textContent = '제목 불러오기';
    btn.dataset.scanning = '0';
    setBulkStatus('ok', '⏹ 스캔 중단됨. (' + bulkCandidates.length + '개 수집)');
    setBulkProgress(-1, null);
    if (bulkCandidates.length > 0) renderBulkPreview();
  } else {
    bulkFetchTitles();
  }
}

async function bulkFetchTitles() {
  const fromVal = document.getElementById('bulkDateFrom').value;
  const toVal   = fromVal; // 단일 날짜
  if (!fromVal) { setBulkStatus('err', '날짜를 선택해주세요.'); return; }

  const btn = document.getElementById('bulkBtn');
  scanStopped = false;
  bulkCandidates = [];
  document.getElementById('bulkPreview').style.display = 'none';
  btn.textContent = '⏹ 스캔 중단';
  btn.dataset.scanning = '1';

  // 날짜를 "26-03-18" 형식으로 변환 (yy-mm-dd)
  const fromYMD = fromVal.slice(2).replace(/-/g, '-');
  const toYMD   = toVal.slice(2).replace(/-/g, '-');

  setBulkProgress(null, '페이지 스캔 시작...');
  setBulkStatus('loading', '');

  try {
    let page = 1;
    const MAX_PAGES = 50;

    while (page <= MAX_PAGES && !scanStopped) {
      const listUrl = 'https://www.wisetoto.com/news/list.htm?b_id=1&category=2&sort=date&page=' + page;
      setBulkProgress(null, page + '페이지 스캔 중... (' + bulkCandidates.length + '개 수집)');

      let html = '';
      try { html = await proxyFetch(listUrl, true); } catch(e) { break; }

      // HTML 방식: class="news_title" 패턴
      const htmlTitlePat = /href="([^"]*seq=(\d+)[^"]*)"[^>]*class="news_title"[^>]*>([^<]+)<\/a>/g;
      // Markdown 방식: [[뉴스] 제목](url) 패턴
      const mdTitlePat   = /\[(\[뉴스\][^\]]+)\]\([^)]*seq=(\d+)[^)]*\)/g;
      // 날짜 패턴
      const datePat      = /\[(\d{2}-\d{2}-\d{2}) \d{2}:\d{2}:\d{2}\]/g;

      // 날짜 목록 먼저 추출
      const dates = [];
      let dm;
      while ((dm = datePat.exec(html)) !== null) dates.push(dm[1]);

      // seq+제목 추출 (HTML 방식 우선, 없으면 마크다운)
      const items = [];
      let hm;
      while ((hm = htmlTitlePat.exec(html)) !== null) {
        items.push({ seq: hm[2], title: hm[3].replace(/^\[뉴스\]\s*/, '').trim(), href: hm[1] });
      }
      if (items.length === 0) {
        let mm2;
        while ((mm2 = mdTitlePat.exec(html)) !== null) {
          items.push({ seq: mm2[2], title: mm2[1].replace(/^\[뉴스\]\s*/, '').trim(), href: null });
        }
      }

      if (items.length === 0) break;

      let foundInRange = 0;
      let allTooOld = true;

      for (let i = 0; i < items.length; i++) {
        const item  = items[i];
        const dStr  = dates[i] || '';

        if (!dStr) continue;
        if (dStr > toYMD) continue;      // 아직 범위보다 최신
        if (dStr < fromYMD) continue;    // 범위보다 오래됨 (skip이지만 allTooOld 체크)

        allTooOld = false;

        if (!bulkCandidates.find(function(x){ return x.seq === item.seq; })) {
          const artUrl = 'https://www.wisetoto.com/news/view.htm?b_id=1&category=2&seq=' + item.seq + '&sort=date&page=' + page;
          bulkCandidates.push({ seq: item.seq, title: decodeHtmlEntities(item.title), url: artUrl, removed: false });
          foundInRange++;
        }
      }

      // 이 페이지 기사들이 모두 fromYMD보다 오래됐으면 중단
      const pageOldest = dates[dates.length - 1] || '';
      if (pageOldest && pageOldest < fromYMD) break;

      page++;
    }

    btn.textContent = '제목 불러오기';
    btn.dataset.scanning = '0';
    setBulkProgress(-1, null);

    if (bulkCandidates.length === 0) {
      setBulkStatus('err', '해당 기간(' + fromVal + ' ~ ' + toVal + ')에 기사가 없어요.');
      return;
    }

    setBulkStatus('ok', '✓ ' + bulkCandidates.length + '개 제목 수집 완료! KBO 필터링 버튼으로 자동 분류하거나 직접 제거 후 퀴즈 생성을 누르세요.');
    renderBulkPreview();

  } catch(e) {
    btn.textContent = '제목 불러오기';
    btn.dataset.scanning = '0';
    setBulkProgress(-1, null);
    setBulkStatus('err', '오류: ' + e.message);
  }
}

function renderBulkPreview() {
  const preview = document.getElementById('bulkPreview');
  const list    = document.getElementById('bulkPreviewList');
  const count   = document.getElementById('bulkPreviewCount');

  const active = bulkCandidates.filter(function(x){ return !x.removed; });
  count.textContent = active.length + '개 기사 선택됨';

  list.innerHTML = bulkCandidates.map(function(item, i) {
    return '<div class="bulk-preview-item' + (item.removed ? ' removed' : '') + '" id="bpi-' + i + '">' +
      '<span class="bulk-preview-title">' + item.title + '</span>' +
      '<button class="bulk-remove-btn" onclick="toggleBulkItem(' + i + ')">' + (item.removed ? '↩' : '✕') + '</button>' +
    '</div>';
  }).join('');

  preview.style.display = 'flex';
  preview.style.flexDirection = 'column';
  const genBtn = document.getElementById('bulkGenBtn');
  if (genBtn) genBtn.disabled = active.length === 0;
}

function toggleBulkItem(i) {
  bulkCandidates[i].removed = !bulkCandidates[i].removed;
  renderBulkPreview();
}

function stopBulkGenerate() {
  bulkStopped = true;
  const stopBtn = document.getElementById('bulkStopBtn');
  const genBtn  = document.getElementById('bulkGenBtn');
  if (stopBtn) stopBtn.style.display = 'none';
  if (genBtn)  genBtn.disabled = false;
  setBulkStatus('ok', '⏹ 생성 중단됨.');
  setBulkProgress(-1, null);
}

async function bulkGenerateQuizzes() {
  const active = bulkCandidates.filter(function(x){ return !x.removed; });
  if (active.length === 0) return;

  const genBtn = document.getElementById('bulkGenBtn');
  bulkStopped = false;
  genBtn.disabled = true;
  const stopBtn = document.getElementById('bulkStopBtn');
  if (stopBtn) stopBtn.style.display = 'inline-flex';
  document.getElementById('bulkPreview').style.display = 'none';
  setBulkStatus('loading', '0 / ' + active.length + ' 퀴즈 생성 중...');
  setBulkProgress(0, '0 / ' + active.length + ' 퀴즈 생성 중...');

  let done = 0;
  for (const item of active) {
    if (bulkStopped) break;
    const id = 'a' + Date.now() + item.seq;
    articles.push({ id, title: item.title, source: item.url, content: '', status: 'loading', quizzes: [] });
    if (!activeId) { activeId = id; }
    renderSidebar();
    renderMain();

    try {
      // 내용 fetch
      const html = await proxyFetch(item.url, true);
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      // 전체 제목 추출 (상세 페이지 a.news_title)
      const titleEl = doc.querySelector('a.news_title');
      if (titleEl) {
        const fullTitle = decodeHtmlEntities(titleEl.textContent.trim().replace(/^\[뉴스\]\s*/, '').trim());
        const a2 = articles.find(function(x){ return x.id === id; });
        if (a2 && fullTitle) {
          a2.title = fullTitle;
          // 사이드바 즉시 갱신
          renderSidebar();
        }
      }

      let content = '';
      const bodyEl = doc.querySelector('.bbs_view');
      if (bodyEl) {
        bodyEl.querySelectorAll('img,script,style').forEach(function(el){ el.remove(); });
        content = (bodyEl.innerText || bodyEl.textContent || '').replace(/\s+/g, ' ').trim();
      }
      if (!content) {
        const stripped = html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');
        const dateMatch = stripped.match(/\d{2}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/);
        const copIdx = stripped.lastIndexOf('저작권');
        const bStart = dateMatch ? stripped.indexOf(dateMatch[0]) + dateMatch[0].length : 0;
        const bEnd = copIdx > bStart ? copIdx : stripped.length;
        content = stripped.slice(bStart, bEnd).trim();
      }

      const a = articles.find(function(x){ return x.id === id; });
      if (!a) continue;
      a.content = content;

      if (content && content.length > 50) {
        const quiz = await callAPI(a);
        a.quizzes = quiz.quizzes;
        a.status = 'ready';
        // Gemini가 반환한 제목도 fallback으로 사용
        if (!a.title && quiz.title) a.title = quiz.title;
      } else {
        a.status = 'pending';
      }
    } catch(e) {
      const a = articles.find(function(x){ return x.id === id; });
      if (a) a.status = 'pending';
    }

    done++;
    const pct = Math.round(done / active.length * 100);
    setBulkProgress(pct, done + ' / ' + active.length + ' 퀴즈 생성 중...');
    setBulkStatus('loading', done + ' / ' + active.length + ' 완료...');
    renderSidebar();
    if (activeId === id) renderMain();
  }

  genBtn.disabled = false;
  if (stopBtn) stopBtn.style.display = 'none';
  setBulkStatus('ok', '✓ ' + done + '개 퀴즈 생성 완료!');
  bulkCandidates = [];
}



function setBulkStatus(type, msg) {
  const el = document.getElementById('bulkStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'bulk-status ' + type;
}

async function runAutoFilter() {
  const btn = document.getElementById('bulkFilterBtn');
  if (btn) btn.disabled = true;
  setBulkStatus('loading', 'KBO 필터링 중...');
  await autoFilterCandidates();
  setBulkStatus('ok', '✓ 필터링 완료!');
  if (btn) btn.disabled = false;
  renderBulkPreview();
}

async function autoFilterCandidates() {
  const GEMINI_KEY = getApiKey();
  if (!GEMINI_KEY) return;

  // removed 초기화 (전체 다시 판단)
  bulkCandidates.forEach(function(x){ x.removed = false; });

  const titles = bulkCandidates.map(function(x, i){ return i + ': ' + x.title; }).join('\n');

  const prompt = '아래 스포츠 뉴스 기사 제목 목록을 보고, KBO(한국프로야구) 관련 기사만 골라줘.\n\n' +
    '[KBO 포함]: KBO 팀(삼성/롯데/한화/KIA/LG/두산/NC/KT/SSG/키움/울산 등) 선수/감독/코치, KBO 시범경기/정규시즌/FA/트레이드/외국인선수.\n' +
    '[KBO 제외]: WBC/MLB/NPB 등 해외야구, 축구/농구/배구/골프 등 타종목, 이벤트/셔틀버스/광고 안내.\n\n' +
    '반드시 아래 JSON 형식으로만 답해. 다른 말 하지 마:\n' +
    '{"results":[1,0,1,0,...]} (순서대로 1=KBO관련, 0=제외)\n\n' +
    '제목 목록:\n' + titles;

  try {
    const res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=' + GEMINI_KEY,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0 }
        })
      }
    );
    if (!res.ok) { console.warn('필터링 API 오류:', res.status); return; }
    const d = await res.json();
    const raw = (d.candidates?.[0]?.content?.parts?.[0]?.text || '').replace(/```json|```/g, '').trim();

    // JSON 파싱 시도
    let results = null;
    try {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed.results)) results = parsed.results;
    } catch(e) {
      // fallback: [1,0,1,...] 배열만 있는 경우
      const arrMatch = raw.match(/\[[\d,\s]+\]/);
      if (arrMatch) {
        try { results = JSON.parse(arrMatch[0]); } catch(e2) {}
      }
    }

    if (!results) { console.warn('필터링 파싱 실패. raw:', raw); return; }

    results.forEach(function(val, idx) {
      if (bulkCandidates[idx] !== undefined) {
        bulkCandidates[idx].removed = (val !== 1);
      }
    });

    const kept = results.filter(function(v){ return v === 1; }).length;
    console.log('필터링 완료: ' + kept + '/' + bulkCandidates.length + ' KBO 기사');

  } catch(e) {
    console.warn('자동 필터링 실패:', e.message);
  }
}

function setBulkProgress(pct, label) {
  const bar   = document.getElementById('bulkProgressBar');
  const indet = document.getElementById('bulkProgressIndeterminate');
  const lbl   = document.getElementById('bulkProgressLabel');
  const wrap  = document.getElementById('bulkProgressWrap');
  if (!wrap) return;

  // pct === null → indeterminate (스캔중), pct === -1 → 숨김, pct 0~100 → 확정 진행률
  if (pct === -1) { wrap.style.display = 'none'; return; }

  wrap.style.display = 'block';

  if (pct === null) {
    // 인디케이터 모드 (스캔 중)
    bar.style.width = '0%';
    indet.style.display = 'block';
  } else {
    // 확정 진행률 모드
    indet.style.display = 'none';
    bar.style.width = pct + '%';
  }

  if (label !== null && label !== undefined) lbl.textContent = label;

  if (pct === 100) {
    setTimeout(function(){ wrap.style.display = 'none'; }, 800);
  }
}
